rules = [
  # ── terminals (isterminal=1 enables window swallowing) ──
  { class="ghostty",        isterminal=1 },

  # ── no-swallow ──
  { title="Event Tester",   noswallow=1  },

  # ── assign to tag ──
  { class="thunar",        tags=1 },
  { class="librewolf",     tags=1 },
  { class="Google-chrome", tags=1 },
  { class="slack",         tags=2 },
  { class="discord",       tags=2 },
  { class="Steam",         tags=5, monitor=1 },
]
