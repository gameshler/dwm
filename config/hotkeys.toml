# ── VARIABLES ──

[vars]
terminal = "ghostty"
webapp   = "webapp-launch"

# ── KEYBINDINGS ──

keys = [

  # ── Launchers ──
  { mod="SUPER",            key="r",       desc="App launcher",            func="spawn",       exec=["rofi", "-show", "drun"] },
  { mod="SUPER",            key="x",       desc="Terminal",                func="spawn",       exec=["$terminal"] },
  { mod="SUPER SHIFT",      key="w",       desc="Randomize wallpaper",     func="spawn",       cmd="feh --randomize --bg-fill ~/Pictures/backgrounds/*" },

  # ── Web apps ──
  { mod="SUPER",            key="a",       desc="ChatGPT",                 func="spawn",       exec=["$webapp", "https://chatgpt.com"] },
  { mod="SUPER SHIFT",      key="a",       desc="Gemini",                  func="spawn",       exec=["$webapp", "https://gemini.google.com/"] },
  { mod="SUPER",            key="b",       desc="Browser",                 func="spawn",       cmd="xdg-open https://" },

  # ── Screenshots ──
  { mod="SUPER",            key="p",       desc="Screenshot (fullscreen)", func="spawn",       cmd="dwm-screenshot full" },
  { mod="SUPER SHIFT",      key="p",       desc="Screenshot area → file",  func="spawn",       cmd="dwm-screenshot gui" },
  { mod="SUPER CTRL",       key="p",       desc="Screenshot area → clip",  func="spawn",       cmd="dwm-screenshot clip" },

  # ── Files & utilities ──
  { mod="SUPER",            key="e",       desc="File manager",            func="spawn",       cmd="xdg-open ." },
  { mod="SUPER CTRL",       key="r",       desc="Restart Proton/Steam",    func="spawn",       cmd="protonrestart" },

  # ── Volume ──
  { mod="",                 key="XF86AudioRaiseVolume",   desc="Volume up",     func="spawn",  cmd="amixer sset Master 5%+ unmute" },
  { mod="",                 key="XF86AudioLowerVolume",   desc="Volume down",   func="spawn",  cmd="amixer sset Master 5%- unmute" },
  { mod="",                 key="XF86AudioMute",          desc="Mute toggle",   func="spawn",  cmd="amixer sset Master toggle" },

  # ── Brightness ──
  { mod="",                 key="XF86MonBrightnessUp",    desc="Brightness +",  func="spawn",  cmd="xbacklight -inc 10" },
  { mod="",                 key="XF86MonBrightnessDown",  desc="Brightness -",  func="spawn",  cmd="xbacklight -dec 10" },

  # ── Window focus & movement ──
  { mod="SUPER",            key="j",       desc="Focus next window",       func="focusstack",  i=1 },
  { mod="SUPER",            key="k",       desc="Focus prev window",       func="focusstack",  i=-1 },
  { mod="SUPER SHIFT",      key="j",       desc="Move window down",        func="movestack",   i=1 },
  { mod="SUPER SHIFT",      key="k",       desc="Move window up",          func="movestack",   i=-1 },
  { mod="SUPER",            key="Return",  desc="Promote to master",       func="zoom" },
  { mod="SUPER",            key="Tab",     desc="Previous tag",            func="view" },
  { mod="SUPER",            key="q",       desc="Close window",            func="killclient" },

  # ── Master / stack sizing ──
  { mod="SUPER",            key="i",       desc="Add to master",           func="incnmaster",  i=1 },
  { mod="SUPER",            key="d",       desc="Remove from master",      func="incnmaster",  i=-1 },
  { mod="SUPER",            key="h",       desc="Shrink master",           func="setmfact",    f=-0.05 },
  { mod="SUPER",            key="l",       desc="Grow master",             func="setmfact",    f=0.05 },
  { mod="SUPER SHIFT",      key="h",       desc="Cfact grow",              func="setcfact",    f=0.25 },
  { mod="SUPER SHIFT",      key="l",       desc="Cfact shrink",            func="setcfact",    f=-0.25 },
  { mod="SUPER SHIFT",      key="o",       desc="Cfact reset",             func="setcfact",    f=0.00 },

  # ── Layouts  (0=tiling  1=floating  2=monocle) ──
  { mod="SUPER",            key="t",       desc="Tile layout",             func="setlayout",   layout_idx=0 },
  { mod="SUPER",            key="f",       desc="Float layout",            func="setlayout",   layout_idx=1 },
  { mod="SUPER",            key="m",       desc="Fullscreen",              func="fullscreen" },
  { mod="SUPER SHIFT",      key="m",       desc="Toggle floating window",  func="togglefloating" },
  { mod="SUPER",            key="space",   desc="Toggle float/tile",       func="togglefloating" },
  { mod="SUPER SHIFT",      key="y",       desc="Fake fullscreen",         func="togglefakefullscreen" },
  { mod="SUPER SHIFT",      key="b",       desc="Toggle bar",              func="togglebar" },

  # ── Multi-monitor ──
  { mod="SUPER",            key="comma",   desc="Focus left monitor",      func="focusmon",    i=-1 },
  { mod="SUPER",            key="period",  desc="Focus right monitor",     func="focusmon",    i=1 },
  { mod="SUPER SHIFT",      key="comma",   desc="Send to left monitor",    func="tagmon",      i=-1 },
  { mod="SUPER SHIFT",      key="period",  desc="Send to right monitor",   func="tagmon",      i=1 },

  # ── Session / power ──
  { mod="SUPER",            key="0",       desc="Show all tags",           func="view",        ui=-1 },
  { mod="SUPER SHIFT",      key="q",       desc="Quit dwm",                func="quit" },
  { mod="SUPER CTRL",       key="q",       desc="Power menu",              func="spawn",       cmd="$HOME/.config/rofi/powermenu.sh" },
  { mod="SUPER CTRL SHIFT", key="r",       desc="Reboot",                  func="spawn",       cmd="systemctl reboot" },
  { mod="SUPER CTRL SHIFT", key="s",       desc="Suspend",                 func="spawn",       cmd="systemctl suspend" },

  # ── Scripts ── 
  { mod="SUPER CTRL SHIFT", key="t",       desc="Repository finder",       func="spawn",       cmd="$HOME/.config/rofi/repo-finder.sh" },
  { mod="SUPER CTRL SHIFT", key="b",       desc="Bookmarks menu",          func="spawn",       cmd="$HOME/.config/rofi/bookmarksmenu.sh" },

]

tag_keys = [
  { key="1", tag=0 },
  { key="2", tag=1 },
  { key="3", tag=2 },
  { key="4", tag=3 },
  { key="5", tag=4 },
  { key="6", tag=5 },
  { key="7", tag=6 },
  { key="8", tag=7 },
  { key="9", tag=8 },
]

buttons = [
  { click="ClkTagBar",    mod="SUPER",  button=1,  func="tag" },
  { click="ClkTagBar",    mod="SUPER",  button=3,  func="toggletag" },
  { click="ClkClientWin", mod="SUPER",  button=1,  func="moveorplace",  i=2 },
  { click="ClkClientWin", mod="SUPER",  button=3,  func="resizemouse" },
  { click="ClkTagBar",    mod="",       button=1,  func="view" },
  { click="ClkTagBar",    mod="",       button=3,  func="toggleview" },
]
